name: Actualizar datos MLB Edge

on:
  schedule:
    # Corrida completa (mañana) — 7am hora de Puerto Vallarta (UTC-6) = 13:00 UTC
    - cron: '0 13 * * *'
    # Corrida refresh (tarde) — 1pm hora de Puerto Vallarta = 19:00 UTC
    - cron: '0 19 * * *'
    # NUEVA: Corrida anticipada — 9am hora de Puerto Vallarta = 15:00 UTC
    # Para capturar abridores confirmados y movimiento de línea temprano
    - cron: '0 15 * * *'
    # NUEVA: Corrida nocturna — 6pm hora de Puerto Vallarta = 00:00 UTC
    # Para registrar el cierre de líneas antes del fin del día (datos valiosos
    # para el análisis de movimiento de línea y calibración del modelo)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de corrida'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - refresh

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Determinar modo de corrida
        id: mode
        run: |
          # workflow_dispatch usa el input directo
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          # 13:00 UTC y 15:00 UTC = corrida completa (mañana y anticipada)
          elif [ "$(date -u +%H)" = "13" ] || [ "$(date -u +%H)" = "15" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          # 19:00 UTC = refresh tarde
          elif [ "$(date -u +%H)" = "19" ]; then
            echo "mode=refresh" >> $GITHUB_OUTPUT
          # 00:00 UTC = refresh nocturno (cierre de líneas)
          else
            echo "mode=refresh" >> $GITHUB_OUTPUT
          fi

      - name: Generar data.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python build_data.py --mode=${{ steps.mode.outputs.mode }}

      - name: Commit y push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add data.json odds_cache.json
          git diff --staged --quiet || git commit -m "Actualizar datos MLB Edge (${{ steps.mode.outputs.mode }}) - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
